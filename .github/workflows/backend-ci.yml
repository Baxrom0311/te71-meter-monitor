name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile backend
        run: python -m compileall -q .

      - name: Run smoke tests
        run: python -m unittest tests.test_backend_smoke

      - name: Run API integration tests
        run: python -m unittest tests.test_api_integration

      - name: Run Alembic migrations
        run: |
          tmpdb="$(mktemp /tmp/meter-ci-XXXX.db)"
          DB_PATH="$tmpdb" DATABASE_URL="sqlite+aiosqlite:///$tmpdb" alembic upgrade head
          rm -f "$tmpdb"

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync backend to server
        run: |
          rsync -az --delete \
            --rsync-path=/usr/bin/rsync \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='venv/' \
            --exclude='data/' \
            --exclude='backups/' \
            --exclude='firmware/' \
            --exclude='.env' \
            --exclude='deploy/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            backend/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/root/meter_backend/

      - name: Restart backend service
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin && systemctl restart meter-api && systemctl is-active meter-api"
