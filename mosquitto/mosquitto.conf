# Mosquitto MQTT Broker — Meter Monitor

# TCP (ESP32 + backend)
listener 1883
allow_anonymous true

# WebSocket (browser via mqtt.js — ixtiyoriy)
listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection limits
max_connections 200
max_keepalive 120
