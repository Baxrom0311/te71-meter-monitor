; =============================================================================
; Meter Monitor — ESP32 Firmware
; =============================================================================

[platformio]
default_envs = electricity

; ─── Umumiy sozlamalar ────────────────────────────────────────────────────────
[base]
platform    = espressif32@6.4.0
board       = esp32dev
framework   = arduino
monitor_speed   = 115200
monitor_filters = direct, time
build_unflags   = -std=gnu++11
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    tzapu/WiFiManager@^2.0.17
board_build.partitions = min_spiffs.csv
upload_speed       = 115200
upload_resetmethod = nodemcu

; ─── Elektr hisoblagich — TE71/TE73 RS-485 DLMS ─────────────────────────────
[env:electricity]
extends    = base
build_flags = ${base.build_flags} -DSENSOR_ELECTRICITY
; upload_port = COM18     ; ← O'z portingizni kiriting yoki boshqa ko'rsating

; ─── Suv hisoblagichi (kelajak) ───────────────────────────────────────────────
[env:water]
extends    = base
build_flags = ${base.build_flags} -DSENSOR_WATER
; upload_port = COM19
