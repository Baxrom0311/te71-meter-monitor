; =============================================================================
; TE71 RS-485 Diagnostic Tool
; ESP32 DevKit + MAX485ESA TTL-to-RS485
; PlatformIO Configuration
; =============================================================================

[env:esp32dev]
platform = espressif32@6.4.0
board = esp32dev
framework = arduino

; Serial Monitor
monitor_speed = 115200
monitor_filters = direct, time

; PHY kalibrasiyani o'chir (full cal hang qilmoqda)
board_build.sdkconfig = sdkconfig.defaults

; Compiler settings
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -DCORE_DEBUG_LEVEL=5

build_unflags = -std=gnu++11

; Libraries
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.4
    tzapu/WiFiManager@^2.0.17

; Upload
upload_speed = 115200
upload_resetmethod = nodemcu

; OTA uchun katta bo'lim kerak
board_build.partitions = min_spiffs.csv
