; =============================================================================
; Meter Monitor — ESP32 Firmware
; =============================================================================
;
; YANGI QURILMA QO'SHISH:
;   1. Quyidagi "KONFIGURATSIYA BAYROQLARI" bo'limini o'qing
;   2. Mos [env:...] ni toping yoki yangisini yarating
;   3. pio run -e <env_nomi> -t upload --upload-port COMxx
;
; ─────────────────────────────────────────────────────────────────────────────
; KONFIGURATSIYA BAYROQLARI (build_flags):
;
; [SENSOR — bittasini tanlang]
;   -DSENSOR_SOIL          → Tuproq namligi (kapasitiv ADC)
;   -DSENSOR_WATER         → Suv bosimi (2x analog ADC)
;   -DSENSOR_GAS           → Gaz bosimi (1x analog ADC)
;   -DSENSOR_ELECTRICITY   → Elektr hisoblagich (RS-485 DLMS TE71/TE73)
;
; [ULANISH — biri yoki ikkisi]
;   (bayroqsiz)            → Faqat WiFi (standart)
;   -DLORA_NODE            → Faqat LoRa (WiFi yo'q)
;   -DLORA_GATEWAY         → LoRa qabul qiluvchi + WiFi → backend
;
; [EKRAN — ixtiyoriy]
;   -DHAVE_LCD             → LCD 16x2 I2C bor
;   -DLCD_SDA=21           → LCD SDA pini (standart: 21)
;   -DLCD_SCL=22           → LCD SCL pini (standart: 22)
;
; [SOIL PIN/KALIBROVKA — ixtiyoriy override]
;   -DPIN_SOIL_ADC=32      → ADC GPIO (standart: 34)
;   -DSOIL_ADC_DRY=3300    → Havoda o'lchang va kiriting (standart: 3300)
;   -DSOIL_ADC_WET=1400    → Suvda o'lchang va kiriting (standart: 1400)
;
; [SOUND PIN/KALIBROVKA — ixtiyoriy override]
;   -DPIN_SOUND_ADC=34     → Mikrofon AOUT GPIO (standart: 34)
;   -DSOUND_SAMPLES=300    → Amplituda namunalar soni (standart: 300)
;   -DSOUND_CALIB_MS=5000  → Startup kalibrovka vaqti ms (standart: 5000)
;   -DSOUND_FIGHT_REF=200  → "100%" mos amplituda (standart: 200)
;   -DREAD_INTERVAL_MS=10000 → O'qish intervali ms (sound uchun 10s)
;
; [DEBUG]
;   -DCORE_DEBUG_LEVEL=5 -DAPP_DEBUG  → Serial monitor yoqiladi
; =============================================================================

[platformio]
default_envs = soil_debug

; ─── Umumiy sozlamalar (barcha envlar ushbu bazadan foydalanadi) ───────────────
[base]
platform    = espressif32@6.4.0
board       = esp32dev
framework   = arduino
monitor_speed   = 115200
monitor_filters = direct, time
build_unflags   = -std=gnu++11
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
board_build.partitions = min_spiffs.csv
upload_speed       = 115200
upload_resetmethod = nodemcu

; ─── Kutubxonalar to'plamlari ─────────────────────────────────────────────────
[libs_base]
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    tzapu/WiFiManager@^2.0.17

[libs_lcd]
lib_deps =
    ${libs_base.lib_deps}
    marcoschwartz/LiquidCrystal_I2C@^1.1.4

[libs_lora]
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    sandeepmistry/LoRa@^0.8.0

; =============================================================================
; TUPROQ NAMLIGI SENSORI
; =============================================================================

; --- WiFi + LCD bor (GPIO32, kalibrovka: quruq=3300, nam=1400) ---------------
[env:soil_wifi_lcd]
extends  = base
build_flags =
    ${base.build_flags}
    -DSENSOR_SOIL
    -DHAVE_LCD
    -DPIN_SOIL_ADC=32
    -DSOIL_ADC_DRY=3300
    -DSOIL_ADC_WET=1400
lib_deps = ${libs_lcd.lib_deps}
; upload_port = COM21

; --- WiFi + LCD yo'q (GPIO32) ------------------------------------------------
[env:soil_wifi]
extends  = base
build_flags =
    ${base.build_flags}
    -DSENSOR_SOIL
    -DPIN_SOIL_ADC=32
    -DSOIL_ADC_DRY=3300
    -DSOIL_ADC_WET=1400
lib_deps = ${libs_base.lib_deps}
; upload_port = COM22

; --- LoRa node (WiFi yo'q, LCD yo'q) ─────────────────────────────────────────
[env:soil_lora]
extends  = base
build_flags =
    ${base.build_flags}
    -DSENSOR_SOIL
    -DLORA_NODE
    -DPIN_SOIL_ADC=32
    -DSOIL_ADC_DRY=3300
    -DSOIL_ADC_WET=1400
lib_deps = ${libs_lora.lib_deps}
; upload_port = COM23

; --- LoRa node + LCD ----------------------------------------------------------
[env:soil_lora_lcd]
extends  = base
build_flags =
    ${base.build_flags}
    -DSENSOR_SOIL
    -DLORA_NODE
    -DHAVE_LCD
    -DPIN_SOIL_ADC=32
    -DSOIL_ADC_DRY=3300
    -DSOIL_ADC_WET=1400
lib_deps =
    ${libs_lcd.lib_deps}
    sandeepmistry/LoRa@^0.8.0
; upload_port = COM24

; --- Debug (Serial monitor yoqilgan, WiFi + LCD) ─────────────────────────────
[env:soil_debug]
extends  = base
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=5
    -DAPP_DEBUG
    -DSENSOR_SOIL
    -DHAVE_LCD
    -DPIN_SOIL_ADC=32
    -DSOIL_ADC_DRY=3300
    -DSOIL_ADC_WET=1400
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
lib_deps = ${libs_lcd.lib_deps}

; --- Eskirgan nom (eski skriptlar uchun) → soil_wifi_lcd ga teng ──────────────
[env:soil]
extends  = env:soil_wifi_lcd

; =============================================================================
; OVOZ DARAJASI SENSORI (mikrofon ADC)
; =============================================================================

; --- WiFi + LCD bor (GPIO34, har 10s o'qish) ----------------------------------
[env:sound_wifi_lcd]
extends  = base
build_flags =
    ${base.build_flags}
    -DSENSOR_SOUND
    -DHAVE_LCD
    -DPIN_SOUND_ADC=34
    -DREAD_INTERVAL_MS=10000
lib_deps = ${libs_lcd.lib_deps}

; --- WiFi + LCD yo'q (GPIO34) -------------------------------------------------
[env:sound_wifi]
extends  = base
build_flags =
    ${base.build_flags}
    -DSENSOR_SOUND
    -DPIN_SOUND_ADC=34
    -DREAD_INTERVAL_MS=10000
lib_deps = ${libs_base.lib_deps}

; --- LoRa node (WiFi yo'q, LCD yo'q, GPIO34) ----------------------------------
[env:sound_lora]
extends  = base
build_flags =
    ${base.build_flags}
    -DSENSOR_SOUND
    -DLORA_NODE
    -DPIN_SOUND_ADC=34
    -DREAD_INTERVAL_MS=10000
lib_deps = ${libs_lora.lib_deps}

; --- LoRa node + LCD (GPIO34) -------------------------------------------------
[env:sound_lora_lcd]
extends  = base
build_flags =
    ${base.build_flags}
    -DSENSOR_SOUND
    -DLORA_NODE
    -DHAVE_LCD
    -DPIN_SOUND_ADC=34
    -DREAD_INTERVAL_MS=10000
lib_deps =
    ${libs_lcd.lib_deps}
    sandeepmistry/LoRa@^0.8.0

; --- Debug (Serial monitor yoqilgan, WiFi, LCD YO'Q, har 10s) ----------------
; LCD o'chirildi — WiFi+LCD bir vaqtda brownout qilishi mumkin (quvvat muammosi)
[env:sound_debug]
extends  = base
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=5
    -DAPP_DEBUG
    -DSENSOR_SOUND
    -DPIN_SOUND_ADC=34
    -DREAD_INTERVAL_MS=10000
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
lib_deps = ${libs_base.lib_deps}

; --- Eskirgan nom → sound_wifi_lcd ga teng ------------------------------------
[env:sound]
extends  = env:sound_wifi_lcd

; =============================================================================
; ELEKTR HISOBLAGICH — TE71/TE73 (RS-485 DLMS)
; =============================================================================

[env:electricity]
extends  = base
build_flags = ${base.build_flags} -DSENSOR_ELECTRICITY -DHAVE_LCD
lib_deps = ${libs_lcd.lib_deps}
; upload_port = COM18

[env:electricity_debug]
extends  = base
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=5
    -DAPP_DEBUG
    -DSENSOR_ELECTRICITY
    -DHAVE_LCD
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
lib_deps = ${libs_lcd.lib_deps}

[env:electricity_test]
extends  = base
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=5
    -DAPP_DEBUG
    -DSENSOR_ELECTRICITY
    -DHAVE_LCD
    -DDEFAULT_TEST_MODE=1
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
lib_deps = ${libs_lcd.lib_deps}

; =============================================================================
; SUV BOSIMI SENSORI (2x analog ADC)
; =============================================================================

[env:water]
extends  = base
build_flags = ${base.build_flags} -DSENSOR_WATER
lib_deps = ${libs_base.lib_deps}
; upload_port = COM19

; =============================================================================
; GAZ BOSIMI SENSORI (1x analog ADC)
; =============================================================================

[env:gas]
extends  = base
build_flags = ${base.build_flags} -DSENSOR_GAS
lib_deps = ${libs_base.lib_deps}
; upload_port = COM20

; =============================================================================
; LORA GATEWAY (LoRa qabul qiluvchi + WiFi → backend)
; =============================================================================

[env:lora_gateway]
extends  = base
build_flags =
    ${base.build_flags}
    -DLORA_GATEWAY
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    tzapu/WiFiManager@^2.0.17
    sandeepmistry/LoRa@^0.8.0

[env:lora_gateway_debug]
extends  = base
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=5
    -DAPP_DEBUG
    -DLORA_GATEWAY
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    tzapu/WiFiManager@^2.0.17
    sandeepmistry/LoRa@^0.8.0

; =============================================================================
; TEST / MAXSUS MUHITLAR
; =============================================================================

[env:electricity_lora_node]
extends  = base
build_flags =
    ${base.build_flags}
    -DSENSOR_ELECTRICITY
    -DLORA_NODE
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    sandeepmistry/LoRa@^0.8.0

[env:ads1115_test]
extends  = base
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
    -DADS1115_TEST
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    adafruit/Adafruit ADS1X15@^2.5.0

; --- Debug (soil_lora, serial log bilan) --------------------------------------
[env:soil_lora_debug]
extends  = base
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=5
    -DAPP_DEBUG
    -DSENSOR_SOIL
    -DLORA_NODE
    -DPIN_SOIL_ADC=32
    -DSOIL_ADC_DRY=3300
    -DSOIL_ADC_WET=1400
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
lib_deps = ${libs_lora.lib_deps}
lib_ldf_mode = chain

; --- Serial-only test (LoRa yo'q, faqat Serial.begin + print) -----------------
[env:soil_lora_serial_test]
extends  = base
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=5
    -DAPP_DEBUG
    -DSENSOR_SOIL
    -DLORA_NODE
    -DSKIP_LORA_INIT
    -DPIN_SOIL_ADC=32
    -DSOIL_ADC_DRY=3300
    -DSOIL_ADC_WET=1400
lib_deps = ${libs_lora.lib_deps}
lib_ldf_mode = chain
