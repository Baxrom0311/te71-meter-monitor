; =============================================================================
; Meter Monitor — ESP32 Firmware
; =============================================================================
;
; Build:
;   pio run -e electricity     → TE71/TE73 elektr hisoblagich (RS-485 DLMS)
;   pio run -e water           → 2x suv bosim sensori (analog ADC)
;   pio run -e gas             → 1x gaz bosim sensori (analog ADC)
;
; Upload:
;   pio run -e electricity -t upload --upload-port COM18
;   pio run -e water       -t upload --upload-port COM19
;   pio run -e gas         -t upload --upload-port COM20
; =============================================================================

[platformio]
default_envs = soil

; ─── Umumiy sozlamalar ────────────────────────────────────────────────────────
[base]
platform    = espressif32@6.4.0
board       = esp32dev
framework   = arduino
monitor_speed   = 115200
monitor_filters = direct, time
build_unflags   = -std=gnu++11
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    tzapu/WiFiManager@^2.0.17
board_build.partitions = min_spiffs.csv
upload_speed       = 115200
upload_resetmethod = nodemcu

; ─── Elektr hisoblagich — TE71/TE73 RS-485 DLMS ─────────────────────────────
[env:electricity]
extends    = base
build_flags = ${base.build_flags} -DSENSOR_ELECTRICITY
; upload_port = COM18

; ─── Elektr hisoblagich — debug mode (serial ON, test mode OFF, real meter) ──
[env:electricity_debug]
extends    = base
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=5
    -DAPP_DEBUG
    -DSENSOR_ELECTRICITY
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'

; ─── Elektr hisoblagich — test mode (tokenni uploaddan oldin almashtiring) ───
[env:electricity_test]
extends    = base
upload_speed = 115200
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=5
    -DAPP_DEBUG
    -DSENSOR_ELECTRICITY
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
    -DDEFAULT_TEST_MODE=1

; ─── LoRa Node (RS-485 meter + LoRa TX, WiFi YO'Q) ──────────────────────────
[env:electricity_lora_node]
extends    = base
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
    -DSENSOR_ELECTRICITY
    -DLORA_NODE
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    sandeepmistry/LoRa@^0.8.0

; ─── LoRa Node debug ──────────────────────────────────────────────────────────
[env:electricity_lora_node_debug]
extends    = base
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=5
    -DAPP_DEBUG
    -DSENSOR_ELECTRICITY
    -DLORA_NODE
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    sandeepmistry/LoRa@^0.8.0

; ─── LoRa Gateway (LoRa RX + WiFi → backend) ─────────────────────────────────
[env:lora_gateway]
extends    = base
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
    -DLORA_GATEWAY
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    tzapu/WiFiManager@^2.0.17
    sandeepmistry/LoRa@^0.8.0

; ─── LoRa Gateway debug ───────────────────────────────────────────────────────
[env:lora_gateway_debug]
extends    = base
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=5
    -DAPP_DEBUG
    -DLORA_GATEWAY
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    tzapu/WiFiManager@^2.0.17
    sandeepmistry/LoRa@^0.8.0

; ─── Suv bosim sensori (2x analog ADC) ───────────────────────────────────────
[env:water]
extends    = base
build_flags = ${base.build_flags} -DSENSOR_WATER
; upload_port = COM19

; ─── ADS1115 test (HY-131 4-20mA + 100Ω shunt) ──────────────────────────────
[env:ads1115_test]
extends    = base
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
    -DADS1115_TEST
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    adafruit/Adafruit ADS1X15@^2.5.0

; ─── Gaz bosim sensori (1x analog ADC) ───────────────────────────────────────
[env:gas]
extends    = base
build_flags = ${base.build_flags} -DSENSOR_GAS
; upload_port = COM20

; ─── Yerto'la namligi sensori (kapasitiv analog ADC + LCD 16x2 I2C) ──────────
[env:soil]
extends    = base
build_flags = ${base.build_flags} -DSENSOR_SOIL
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    tzapu/WiFiManager@^2.0.17
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
; upload_port = COM21

; ─── Yerto'la namligi sensori — debug mode ───────────────────────────────────
[env:soil_debug]
extends    = base
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=5
    -DAPP_DEBUG
    -DSENSOR_SOIL
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    tzapu/WiFiManager@^2.0.17
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
