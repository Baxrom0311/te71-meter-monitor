; =============================================================================
; Meter Monitor — ESP32 Firmware
; =============================================================================
;
; YANGI QURILMA QO'SHISH:
;   1. Quyidagi "KONFIGURATSIYA BAYROQLARI" bo'limini o'qing
;   2. Mos [env:...] ni toping yoki yangisini yarating
;   3. pio run -e <env_nomi> -t upload --upload-port COMxx
;
; ─────────────────────────────────────────────────────────────────────────────
; KONFIGURATSIYA BAYROQLARI (build_flags):
;
; [SENSOR — bittasini tanlang]
;   -DSENSOR_SOIL          → Tuproq namligi (kapasitiv ADC)
;   -DSENSOR_WATER         → Suv bosimi (2x analog ADC)
;   -DSENSOR_GAS           → Gaz bosimi (1x analog ADC)
;   -DSENSOR_ELECTRICITY   → Elektr hisoblagich (RS-485 DLMS TE71/TE73)
;   -DSENSOR_SOUND         → Ovoz darajasi (mikrofon ADC)
;
; [ULANISH — biri yoki ikkisi]
;   (bayroqsiz)            → Faqat WiFi (standart)
;   -DLORA_NODE            → Faqat LoRa (WiFi yo'q) — faqat soil va electricity
;   -DLORA_GATEWAY         → LoRa qabul qiluvchi + WiFi → backend
;
; [EKRAN — ixtiyoriy]
;   -DHAVE_LCD             → LCD 16x2 I2C bor
;   -DLCD_SDA=21           → LCD SDA pini (standart: 21)
;   -DLCD_SCL=22           → LCD SCL pini (standart: 22)
;
; [SOIL PIN/KALIBROVKA — ixtiyoriy override]
;   -DPIN_SOIL_ADC=32      → ADC GPIO (standart: 34)
;   -DSOIL_ADC_DRY=3300    → Havoda o'lchang va kiriting (standart: 3300)
;   -DSOIL_ADC_WET=1400    → Suvda o'lchang va kiriting (standart: 1400)
;
; [SOUND PIN/KALIBROVKA — ixtiyoriy override]
;   -DPIN_SOUND_ADC=34     → Mikrofon AOUT GPIO (standart: 34)
;   -DSOUND_SAMPLES=300    → Amplituda namunalar soni (standart: 300)
;   -DSOUND_CALIB_MS=5000  → Startup kalibrovka vaqti ms (standart: 5000)
;   -DSOUND_FIGHT_REF=200  → "100%" mos amplituda (standart: 200)
;   -DREAD_INTERVAL_MS=10000 → O'qish intervali ms (sound uchun 10s)
;
; [DEBUG]
;   -DCORE_DEBUG_LEVEL=5 -DAPP_DEBUG  → Serial monitor yoqiladi
; =============================================================================

[platformio]
default_envs = soil_debug

; ─── Umumiy sozlamalar ────────────────────────────────────────────────────────
[base]
platform    = espressif32@6.4.0
board       = esp32dev
framework   = arduino
monitor_speed   = 115200
monitor_filters = direct, time
build_unflags   = -std=gnu++11
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
board_build.partitions = min_spiffs.csv
upload_speed       = 115200
upload_resetmethod = nodemcu

; ─── Debug base (barcha debug envlar shu flaglarni oladi) ─────────────────────
[debug]
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=5
    -DAPP_DEBUG
    -DTLS_INSECURE
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'

; ─── Kutubxonalar to'plamlari ─────────────────────────────────────────────────
[libs_base]
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    tzapu/WiFiManager@^2.0.17

[libs_lcd]
lib_deps =
    ${libs_base.lib_deps}
    marcoschwartz/LiquidCrystal_I2C@^1.1.4

; ─── LoRa shifrlash (barcha LoRa envlar uchun) ────────────────────────────────
[lora_flags]
build_flags =
    -DLORA_ENCRYPT

[libs_lora]
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    sandeepmistry/LoRa@^0.8.0

[libs_lora_lcd]
lib_deps =
    ${libs_lcd.lib_deps}
    sandeepmistry/LoRa@^0.8.0

[libs_gw]
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    tzapu/WiFiManager@^2.0.17
    sandeepmistry/LoRa@^0.8.0

; ─── Soil kalibrovka (barcha soil envlar uchun) ───────────────────────────────
[soil_pins]
build_flags =
    -DPIN_SOIL_ADC=32
    -DSOIL_ADC_DRY=3300
    -DSOIL_ADC_WET=1400

; =============================================================================
; TUPROQ NAMLIGI SENSORI
; =============================================================================

[env:soil_wifi_lcd]
extends  = base
build_flags = ${base.build_flags} -DSENSOR_SOIL -DHAVE_LCD ${soil_pins.build_flags}
lib_deps = ${libs_lcd.lib_deps}

[env:soil_wifi]
extends  = base
build_flags = ${base.build_flags} -DSENSOR_SOIL ${soil_pins.build_flags}
lib_deps = ${libs_base.lib_deps}

[env:soil_lora]
extends  = base
build_flags = ${base.build_flags} -DSENSOR_SOIL -DLORA_NODE ${soil_pins.build_flags} ${lora_flags.build_flags}
lib_deps = ${libs_lora.lib_deps}

[env:soil_lora_lcd]
extends  = base
build_flags = ${base.build_flags} -DSENSOR_SOIL -DLORA_NODE -DHAVE_LCD ${soil_pins.build_flags} ${lora_flags.build_flags}
lib_deps = ${libs_lora_lcd.lib_deps}

[env:soil_debug]
extends  = base
build_flags = ${debug.build_flags} -DSENSOR_SOIL -DHAVE_LCD ${soil_pins.build_flags}
lib_deps = ${libs_lcd.lib_deps}

; Eskirgan nom (eski skriptlar uchun)
[env:soil]
extends = env:soil_wifi_lcd

; =============================================================================
; OVOZ DARAJASI SENSORI (mikrofon ADC)
; =============================================================================

[env:sound_wifi_lcd]
extends  = base
build_flags = ${base.build_flags} -DSENSOR_SOUND -DHAVE_LCD -DPIN_SOUND_ADC=34 -DREAD_INTERVAL_MS=10000
lib_deps = ${libs_lcd.lib_deps}

[env:sound_wifi]
extends  = base
build_flags = ${base.build_flags} -DSENSOR_SOUND -DPIN_SOUND_ADC=34 -DREAD_INTERVAL_MS=10000
lib_deps = ${libs_base.lib_deps}

[env:sound_debug]
extends  = base
build_flags =
    ${debug.build_flags}
    -DSENSOR_SOUND
    -DHAVE_LCD
    -DLCD_ADDR=0x27
    -DPIN_SOUND_ADC=34
    -DSOUND_CALIB_MS=1000
    -DREAD_INTERVAL_MS=2000
lib_deps = ${libs_lcd.lib_deps}

; Eskirgan nom
[env:sound]
extends = env:sound_wifi_lcd

[env:sound_lora]
extends  = base
build_flags = ${base.build_flags} -DSENSOR_SOUND -DLORA_NODE -DPIN_SOUND_ADC=34 -DREAD_INTERVAL_MS=10000 ${lora_flags.build_flags}
lib_deps = ${libs_lora.lib_deps}

; =============================================================================
; ELEKTR HISOBLAGICH — TE71/TE73 (RS-485 DLMS)
; =============================================================================

[env:electricity]
extends  = base
build_flags = ${base.build_flags} -DSENSOR_ELECTRICITY -DHAVE_LCD
lib_deps = ${libs_lcd.lib_deps}

[env:electricity_debug]
extends  = base
build_flags = ${debug.build_flags} -DSENSOR_ELECTRICITY -DHAVE_LCD
lib_deps = ${libs_lcd.lib_deps}

[env:electricity_test]
extends  = base
build_flags = ${debug.build_flags} -DSENSOR_ELECTRICITY -DHAVE_LCD -DDEFAULT_TEST_MODE=1
lib_deps = ${libs_lcd.lib_deps}

; =============================================================================
; SUV BOSIMI SENSORI (2x analog ADC)
; =============================================================================

[env:water]
extends  = base
build_flags = ${base.build_flags} -DSENSOR_WATER
lib_deps = ${libs_base.lib_deps}

[env:water_lora]
extends  = base
build_flags = ${base.build_flags} -DSENSOR_WATER -DLORA_NODE ${lora_flags.build_flags}
lib_deps = ${libs_lora.lib_deps}

; =============================================================================
; GAZ BOSIMI SENSORI (1x analog ADC)
; =============================================================================

[env:gas]
extends  = base
build_flags = ${base.build_flags} -DSENSOR_GAS
lib_deps = ${libs_base.lib_deps}

[env:gas_lora]
extends  = base
build_flags = ${base.build_flags} -DSENSOR_GAS -DLORA_NODE ${lora_flags.build_flags}
lib_deps = ${libs_lora.lib_deps}

; =============================================================================
; LORA GATEWAY (LoRa qabul qiluvchi + WiFi → backend)
; =============================================================================

[env:lora_gateway]
extends  = base
build_flags = ${base.build_flags} -DLORA_GATEWAY ${lora_flags.build_flags}
lib_deps = ${libs_gw.lib_deps}

[env:lora_gateway_debug]
extends  = base
build_flags = ${debug.build_flags} -DLORA_GATEWAY -DHAVE_LCD ${lora_flags.build_flags}
lib_deps =
    ${libs_gw.lib_deps}
    marcoschwartz/LiquidCrystal_I2C@^1.1.4

; =============================================================================
; LORA NODE — elektr hisoblagich (RS-485 + LoRa)
; =============================================================================

[env:electricity_lora]
extends  = base
build_flags = ${base.build_flags} -DSENSOR_ELECTRICITY -DLORA_NODE ${lora_flags.build_flags}
lib_deps = ${libs_lora.lib_deps}

[env:electricity_lora_lcd]
extends  = base
build_flags = ${base.build_flags} -DSENSOR_ELECTRICITY -DLORA_NODE -DHAVE_LCD ${lora_flags.build_flags}
lib_deps = ${libs_lora_lcd.lib_deps}

[env:electricity_lora_debug]
extends  = base
build_flags = ${debug.build_flags} -DSENSOR_ELECTRICITY -DLORA_NODE ${lora_flags.build_flags}
lib_deps = ${libs_lora.lib_deps}

; Eskirgan nom
[env:electricity_lora_node]
extends = env:electricity_lora

; =============================================================================
; TEST / MAXSUS MUHITLAR
; =============================================================================

[env:ads1115_test]
extends  = base
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
    -DADS1115_TEST
    '-DDEFAULT_SERVER_URL="https://ss.boos.uz"'
    '-DDEFAULT_DEVICE_TOKEN="T30gwzZJ6YTvQeLRMCZyTi-GBAYogsQV"'
lib_deps =
    bblanchon/ArduinoJson@^6.21.4
    adafruit/Adafruit ADS1X15@^2.5.0

[env:soil_lora_debug]
extends  = base
build_flags = ${debug.build_flags} -DSENSOR_SOIL -DLORA_NODE ${soil_pins.build_flags} ${lora_flags.build_flags}
lib_deps = ${libs_lora.lib_deps}
lib_ldf_mode = chain

[env:soil_lora_serial_test]
extends  = base
build_flags =
    ${debug.build_flags}
    -DSENSOR_SOIL
    -DLORA_NODE
    -DSKIP_LORA_INIT
    ${soil_pins.build_flags}
    ${lora_flags.build_flags}
lib_deps = ${libs_lora.lib_deps}
lib_ldf_mode = chain
