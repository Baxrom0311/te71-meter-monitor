version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# Meter Monitor — To'liq stack
#
# Ishga tushirish:
#   docker-compose up -d
#
# Dashboard:
#   http://localhost:8000
#
# Database:
#   PostgreSQL 5432
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: meter-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=meter_monitor
      - POSTGRES_USER=meter
      - POSTGRES_PASSWORD=meter_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meter -d meter_monitor"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    image: python:3.12-slim
    container_name: meter-backend
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "pip install -r requirements.txt -q &&
             alembic upgrade head &&
             uvicorn app:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
      - firmware_store:/app/firmware
    environment:
      - DATABASE_URL=postgresql+asyncpg://meter:meter_password@postgres:5432/meter_monitor
      - OTA_DIR=/app/firmware
      - STATIC_DIR=/frontend
      - SECRET_KEY=change-me
      - BOOTSTRAP_ADMIN_USERNAME=admin
      - BOOTSTRAP_ADMIN_PASSWORD=Admin123
      - DEVICE_API_TOKEN=change-device-token
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  firmware_store:
