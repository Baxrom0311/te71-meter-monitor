# ──────────────────────────────────────────────────────────────────────────────
# Meter Monitor — To'liq stack
#
# Ishga tushirish:
#   docker compose up -d --build
#
# Dashboard:
#   http://localhost:8000
#
# Database:
#   PostgreSQL 5432
# ──────────────────────────────────────────────────────────────────────────────

x-backend-common: &backend-common
  build:
    context: ./backend
  image: meter-monitor-backend:latest
  restart: unless-stopped
  environment: &backend-env
    - APP_ENV=development
    - DATABASE_URL=postgresql+asyncpg://meter:meter_password@postgres:5432/meter_monitor
    - OTA_DIR=/app/firmware
    - BACKUP_DIR=/app/backups
    - BACKUP_KEEP_DAYS=14
    - AUDIT_KEEP_DAYS=180
    - STATIC_DIR=/frontend
    - SECRET_KEY=change-me
    - BOOTSTRAP_ADMIN_USERNAME=admin
    - BOOTSTRAP_ADMIN_PASSWORD=Admin123
    - DEVICE_API_TOKEN=change-device-token
    - CORS_ORIGINS=*
    - TRUSTED_HOSTS=*
    - RATE_LIMIT_PER_MINUTE=120
    - DEVICE_RATE_LIMIT_PER_MINUTE=600
    - TEST_METER_SERIALS=
    - MAX_REQUEST_BODY_BYTES=26214400
    - COMMAND_TTL_SEC=3600
    - COMMAND_MAX_PENDING_PER_DEVICE=20
    - OTA_BATCH_PROCESS_INTERVAL_SEC=60
    - OTA_BATCH_RETRY_TIMEOUT_SEC=900
    - OTA_BATCH_MAX_RETRIES=3
    - WATER_PRESSURE_MIN_BAR=0.5
    - WATER_BOTTOM_PRESSURE_FOR_TOP_CHECK_BAR=1.0
    - GAS_PRESSURE_MIN_BAR=0.02
    - GAS_PRESSURE_MAX_BAR=5.0
    - ALERT_DEDUPE_SEC=600
    - RUN_INLINE_WORKERS=true
    - LOG_LEVEL=INFO
    - LOG_FORMAT=text
  depends_on: &backend-depends
    postgres:
      condition: service_healthy

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: meter-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=meter_monitor
      - POSTGRES_USER=meter
      - POSTGRES_PASSWORD=meter_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meter -d meter_monitor"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    <<: *backend-common
    container_name: meter-backend
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./meter-frontend/dist:/frontend:ro
      - firmware_store:/app/firmware
      - backup_store:/app/backups
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=5)\""]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Adminer (PostgreSQL web UI) ─────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: meter-adminer
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
      - ADMINER_DESIGN=dracula
    depends_on:
      - postgres

  # ── Portainer (Docker monitoring UI) ────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    container_name: meter-portainer
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  postgres_data:
  firmware_store:
  backup_store:
  portainer_data:
