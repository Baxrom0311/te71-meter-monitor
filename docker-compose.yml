# ──────────────────────────────────────────────────────────────────────────────
# Meter Monitor — To'liq stack
#
# Ishga tushirish:
#   docker compose up -d --build
#
# Dashboard:
#   http://localhost:8000
#
# Flower:
#   http://localhost:5555
#
# Database:
#   PostgreSQL 5432
# ──────────────────────────────────────────────────────────────────────────────

x-backend-common: &backend-common
  build:
    context: ./backend
  image: meter-monitor-backend:latest
  restart: unless-stopped
  environment: &backend-env
    - APP_ENV=development
    - DATABASE_URL=postgresql+asyncpg://meter:meter_password@postgres:5432/meter_monitor
    - OTA_DIR=/app/firmware
    - BACKUP_DIR=/app/backups
    - BACKUP_KEEP_DAYS=14
    - AUDIT_KEEP_DAYS=180
    - STATIC_DIR=/frontend
    - SECRET_KEY=change-me
    - BOOTSTRAP_ADMIN_USERNAME=admin
    - BOOTSTRAP_ADMIN_PASSWORD=Admin123
    - DEVICE_API_TOKEN=change-device-token
    - CORS_ORIGINS=*
    - TRUSTED_HOSTS=*
    - RATE_LIMIT_PER_MINUTE=120
    - DEVICE_RATE_LIMIT_PER_MINUTE=600
    - COMMAND_TTL_SEC=3600
    - COMMAND_MAX_PENDING_PER_DEVICE=20
    - WATER_PRESSURE_MIN_BAR=0.5
    - WATER_BOTTOM_PRESSURE_FOR_TOP_CHECK_BAR=1.0
    - GAS_PRESSURE_MIN_BAR=0.02
    - GAS_PRESSURE_MAX_BAR=5.0
    - ALERT_DEDUPE_SEC=600
    - CELERY_BROKER_URL=redis://redis:6379/0
    - CELERY_RESULT_BACKEND=redis://redis:6379/1
    - RUN_INLINE_WORKERS=false
  depends_on: &backend-depends
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: meter-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=meter_monitor
      - POSTGRES_USER=meter
      - POSTGRES_PASSWORD=meter_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meter -d meter_monitor"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Redis Broker ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: meter-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    <<: *backend-common
    container_name: meter-backend
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/frontend:ro
      - firmware_store:/app/firmware
      - backup_store:/app/backups
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=5)\""]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery-worker:
    <<: *backend-common
    container_name: meter-celery-worker
    command: celery -A core.celery_app.celery_app worker --loglevel=INFO --concurrency=2
    volumes:
      - firmware_store:/app/firmware
      - backup_store:/app/backups

  # ── Celery Beat Scheduler ───────────────────────────────────────────────────
  celery-beat:
    <<: *backend-common
    container_name: meter-celery-beat
    command: >
      celery -A core.celery_app.celery_app beat --loglevel=INFO --schedule=/tmp/celerybeat-schedule

  # ── Flower Celery Monitor ───────────────────────────────────────────────────
  flower:
    <<: *backend-common
    container_name: meter-flower
    command: celery -A core.celery_app.celery_app flower --port=5555
    ports:
      - "5555:5555"

volumes:
  postgres_data:
  redis_data:
  firmware_store:
  backup_store:
